<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gudang Pintar Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#475569',
            accent: '#3B82F6',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 font-sans">
  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 right-0 bg-slate-700 text-white h-14 flex items-center px-6 z-50 shadow">
    <span class="text-lg font-bold">🏭 Gudang Pintar</span>
    <span class="ml-3 text-slate-300 text-sm">Panel Admin</span>
  </nav>

  <div class="flex pt-14 min-h-screen">
    <!-- SIDEBAR -->
    <aside class="w-52 bg-white border-r border-slate-200 fixed top-14 bottom-0">
      <nav class="p-4 space-y-1">
        <a href="#" onclick="showTab('paket')" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-100 bg-slate-100">
          📦 Manajemen Paket
        </a>
        <a href="#" onclick="showTab('kurir')" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-100">
          👤 Data Kurir
        </a>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="ml-52 flex-1 p-6">
      <!-- STATS -->
      <div class="grid grid-cols-3 gap-4 mb-6" id="stats"></div>

      <!-- ADD PAKET FORM -->
      <div class="bg-white rounded-2xl border border-slate-200 p-6 mb-6">
        <h2 class="font-semibold text-slate-700 mb-4">➕ Tambah Paket Baru</h2>
        <div class="grid grid-cols-2 gap-4">
          <input id="no_resi" placeholder="No Resi (GPX-20260510)" class="border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <input id="deskripsi" placeholder="Deskripsi Barang" class="border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <input id="nama_pengirim" placeholder="Nama Pengirim" class="border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <input id="nama_penerima" placeholder="Nama Penerima" class="border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <input id="alamat_penerima" placeholder="Alamat Penerima" class="col-span-2 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <input id="lat" placeholder="Latitude (opsional)" class="border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <input id="lng" placeholder="Longitude (opsional)" class="border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <select id="id_warehouse" class="border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="1">Gudang Pusat Yogyakarta</option>
            <option value="2">Gudang Hub Banguntapan</option>
            <option value="3">Gudang Sortir Sleman</option>
          </select>
          <select id="id_kurir" class="border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">-- Pilih Kurir --</option>
          </select>
        </div>
        <button onclick="tambahPaket()" class="mt-4 bg-slate-700 text-white px-6 py-2.5 rounded-xl text-sm font-medium hover:bg-slate-800 transition">
          Simpan Paket
        </button>
      </div>

      <!-- PAKET TABLE -->
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <div class="flex items-center justify-between p-4 border-b border-slate-100">
          <h2 class="font-semibold text-slate-700">📦 Daftar Paket</h2>
          <button onclick="loadPaket()" class="text-sm text-blue-600 hover:text-blue-800 flex items-center gap-1">🔄 Refresh</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 uppercase text-xs">
              <tr>
                <th class="px-4 py-3 text-left">Resi</th>
                <th class="px-4 py-3 text-left">Barang</th>
                <th class="px-4 py-3 text-left">Penerima</th>
                <th class="px-4 py-3 text-left">Kurir</th>
                <th class="px-4 py-3 text-left">Status</th>
                <th class="px-4 py-3 text-left">Aksi</th>
              </tr>
            </thead>
            <tbody id="tabel-paket" class="divide-y divide-slate-100">
              <tr><td colspan="6" class="text-center py-8 text-slate-400">Memuat...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const BASE = '../api';

    function statusBadge(status) {
      const map = {
        'Di Gudang': 'bg-blue-100 text-blue-700',
        'Sedang Diantar': 'bg-amber-100 text-amber-700',
        'Selesai': 'bg-emerald-100 text-emerald-700',
      };
      const cls = map[status] || 'bg-gray-100 text-gray-600';
      return `<span class="px-2.5 py-1 rounded-full text-xs font-semibold ${cls}">${status}</span>`;
    }

    function statCard(icon, label, value, color) {
      return `<div class="bg-white rounded-2xl border border-slate-200 p-5">
        <div class="text-2xl mb-2">${icon}</div>
        <div class="text-2xl font-bold text-${color}-600">${value}</div>
        <div class="text-sm text-slate-500 mt-1">${label}</div>
      </div>`;
    }

    function renderStats(total, antar, selesai) {
      document.getElementById('stats').innerHTML = `
        ${statCard('📦', 'Total Paket', total, 'slate')}
        ${statCard('🚴', 'Sedang Diantar', antar, 'amber')}
        ${statCard('✅', 'Selesai', selesai, 'emerald')}`;
    }

    async function loadKurir() {
      try {
        const r = await fetch(`${BASE}/get_couriers.php`);
        const d = await r.json();
        const sel = document.getElementById('id_kurir');
        if (d.data) {
          d.data.forEach(k => {
            const o = document.createElement('option');
            o.value = k.id; o.text = k.username;
            sel.appendChild(o);
          });
        }
      } catch(e) { console.log('Gagal load kurir:', e); }
    }

    async function loadPaket() {
      try {
        const r = await fetch(`${BASE}/get_paket.php`);
        const d = await r.json();
        const tbody = document.getElementById('tabel-paket');
        if (!d.data || !d.data.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-slate-400">Belum ada paket</td></tr>';
          renderStats(0, 0, 0);
          return;
        }
        tbody.innerHTML = d.data.map(p => `
          <tr class="hover:bg-slate-50 transition">
            <td class="px-4 py-3 font-mono font-medium text-slate-800">${p.no_resi}</td>
            <td class="px-4 py-3 text-slate-600">${p.deskripsi_barang || '-'}</td>
            <td class="px-4 py-3">
              <div class="font-medium text-slate-800">${p.nama_penerima}</div>
              <div class="text-xs text-slate-400 truncate max-w-40">${p.alamat_penerima || ''}</div>
            </td>
            <td class="px-4 py-3 text-slate-600">${p.id_kurir ? 'Kurir #' + p.id_kurir : '<span class="text-amber-500">Belum</span>'}</td>
            <td class="px-4 py-3">${statusBadge(p.status)}</td>
            <td class="px-4 py-3">
              <button onclick="assignKurir(${p.id}, '${p.no_resi}')" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-blue-700 transition">Assign</button>
            </td>
          </tr>`).join('');
        const total = d.data.length;
        const antar = d.data.filter(p => p.status === 'Sedang Diantar').length;
        const selesai = d.data.filter(p => p.status === 'Selesai').length;
        renderStats(total, antar, selesai);
      } catch(e) { console.log('Gagal load paket:', e); }
    }

    async function tambahPaket() {
      const body = new FormData();
      body.append('no_resi', document.getElementById('no_resi').value);
      body.append('deskripsi_barang', document.getElementById('deskripsi').value);
      body.append('nama_pengirim', document.getElementById('nama_pengirim').value);
      body.append('nama_penerima', document.getElementById('nama_penerima').value);
      body.append('alamat_penerima', document.getElementById('alamat_penerima').value);
      body.append('lat_penerima', document.getElementById('lat').value);
      body.append('lng_penerima', document.getElementById('lng').value);
      body.append('id_warehouse', document.getElementById('id_warehouse').value);
      body.append('id_kurir', document.getElementById('id_kurir').value);
      try {
        const r = await fetch(`${BASE}/add_paket.php`, { method: 'POST', body });
        const d = await r.json();
        alert(d.message);
        if (d.status === 'success') loadPaket();
      } catch(e) { alert('Gagal menambah paket: ' + e); }
    }

    async function assignKurir(id, resi) {
      const kurirId = prompt(`Assign kurir ID ke paket ${resi}:`);
      if (!kurirId) return;
      const body = new FormData();
      body.append('id', id);
      body.append('id_kurir', kurirId);
      try {
        const r = await fetch(`${BASE}/assign_kurir.php`, { method: 'POST', body });
        const d = await r.json();
        alert(d.message);
        loadPaket();
      } catch(e) { alert('Gagal assign kurir: ' + e); }
    }

    function showTab(tab) {
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('bg-slate-100'));
      event.target.closest('.sidebar-link').classList.add('bg-slate-100');
    }

    loadKurir();
    loadPaket();
  </script>
</body>
</html>
