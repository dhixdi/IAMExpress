name: iamexpress_mobile
description: IAMExpress Mobile — Linehaul & Courier App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # HTTP client
  dio: ^5.4.0

  # Storage aman untuk token JWT
  flutter_secure_storage: ^9.0.0

  # Biometrik (fingerprint & face)
  local_auth: ^2.1.8

  # Navigasi deklaratif
  go_router: ^13.2.0

  # Preferensi ringan
  shared_preferences: ^2.2.2

  # Format tanggal, angka, dan mata uang
  intl: ^0.19.0

  # Font
  google_fonts: ^6.1.0

  # Peta interaktif (OpenStreetMap)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # GPS
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # Buka Google Maps eksternal
  url_launcher: ^6.2.5

  # Sensor accelerometer + gyroscope
  sensors_plus: ^4.0.2

  # Notifikasi lokal
  flutter_local_notifications: ^17.1.2

  # Load & cache foto profil dari URL
  cached_network_image: ^3.3.1

  # Ganti foto profil (kamera & galeri)
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
