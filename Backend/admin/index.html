<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin - Gudang Pintar</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background: #f1f5f9; }
header { background: #475569; color: white; padding: 16px 24px; font-size: 20px; font-weight: bold; }
.container { max-width: 900px; margin: 24px auto; padding: 0 16px; }
.card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
h2 { margin-bottom: 16px; color: #334155; font-size: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { background: #f8fafc; padding: 10px; text-align: left; border-bottom: 2px solid #e2e8f0; }
td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
input, select { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
.btn { padding: 8px 16px; background: #475569; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-green { background: #059669; }
.badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
.badge-blue { background: #dbeafe; color: #1d4ed8; }
.badge-orange { background: #ffedd5; color: #c2410c; }
.badge-green { background: #d1fae5; color: #065f46; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head>
<body>
<header>🏭 Gudang Pintar — Panel Admin</header>
<div class="container">

  <!-- TAMBAH PAKET -->
  <div class="card">
    <h2>➕ Tambah Paket Baru</h2>
    <div class="grid2">
      <input id="no_resi" placeholder="No Resi (contoh: GPX-20260510)">
      <input id="deskripsi" placeholder="Deskripsi Barang">
      <input id="nama_pengirim" placeholder="Nama Pengirim">
      <input id="nama_penerima" placeholder="Nama Penerima">
      <input id="alamat_penerima" placeholder="Alamat Penerima" style="grid-column:span 2">
      <input id="lat" placeholder="Latitude (opsional)">
      <input id="lng" placeholder="Longitude (opsional)">
      <select id="id_warehouse">
        <option value="1">Gudang Pusat Yogyakarta</option>
        <option value="2">Gudang Hub Banguntapan</option>
        <option value="3">Gudang Sortir Sleman</option>
      </select>
      <select id="id_kurir"><option value="">-- Pilih Kurir --</option></select>
    </div>
    <button class="btn" onclick="tambahPaket()">Simpan Paket</button>
  </div>

  <!-- LIST PAKET -->
  <div class="card">
    <h2>📦 Semua Paket <button class="btn btn-sm" onclick="loadPaket()">🔄 Refresh</button></h2>
    <table>
      <thead><tr><th>Resi</th><th>Barang</th><th>Penerima</th><th>Kurir</th><th>Status</th><th>Aksi</th></tr></thead>
      <tbody id="tabel-paket"><tr><td colspan="6" style="text-align:center;color:gray">Memuat...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const BASE = '../api';

async function loadKurir() {
  const r = await fetch(`${BASE}/get_couriers.php`);
  const d = await r.json();
  const sel = document.getElementById('id_kurir');
  d.data.forEach(k => {
    const o = document.createElement('option');
    o.value = k.id; o.text = k.username;
    sel.appendChild(o);
  });
}

async function loadPaket() {
  const r = await fetch(`${BASE}/get_paket.php`);
  const d = await r.json();
  const tbody = document.getElementById('tabel-paket');
  if (!d.data.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Kosong</td></tr>'; return; }
  tbody.innerHTML = d.data.map(p => `
    <tr>
      <td>${p.no_resi}</td>
      <td>${p.deskripsi_barang||'-'}</td>
      <td>${p.nama_penerima}<br><small style="color:gray">${p.alamat_penerima.substring(0,40)}...</small></td>
      <td>${p.id_kurir||'Belum'}</td>
      <td><span class="badge ${p.status=='Selesai'?'badge-green':p.status=='Sedang Diantar'?'badge-orange':'badge-blue'}">${p.status}</span></td>
      <td><button class="btn btn-sm btn-green" onclick="assignKurir(${p.id}, '${p.no_resi}')">Assign</button></td>
    </tr>`).join('');
}

async function tambahPaket() {
  const body = new FormData();
  body.append('no_resi', document.getElementById('no_resi').value);
  body.append('deskripsi_barang', document.getElementById('deskripsi').value);
  body.append('nama_pengirim', document.getElementById('nama_pengirim').value);
  body.append('nama_penerima', document.getElementById('nama_penerima').value);
  body.append('alamat_penerima', document.getElementById('alamat_penerima').value);
  body.append('lat_penerima', document.getElementById('lat').value);
  body.append('lng_penerima', document.getElementById('lng').value);
  body.append('id_warehouse', document.getElementById('id_warehouse').value);
  body.append('id_kurir', document.getElementById('id_kurir').value);
  const r = await fetch(`${BASE}/add_paket.php`, { method: 'POST', body });
  const d = await r.json();
  alert(d.message);
  if (d.status === 'success') loadPaket();
}

async function assignKurir(id, resi) {
  const kurirId = prompt(`Assign kurir ID ke paket ${resi}:`);
  if (!kurirId) return;
  const body = new FormData();
  body.append('id', id);
  body.append('id_kurir', kurirId);
  const r = await fetch(`${BASE}/assign_kurir.php`, { method: 'POST', body });
  const d = await r.json();
  alert(d.message);
  loadPaket();
}

loadKurir();
loadPaket();
</script>
</body>
</html>
